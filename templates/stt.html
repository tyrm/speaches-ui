{{define "stt-content"}}
<!-- i18n strings for JavaScript -->
<script>
const i18n = {
	stt_transcribing: "{{call .T "stt_transcribing"}}",
	stt_processing: "{{call .T "stt_processing"}}",
	stt_success: "{{call .T "stt_success"}}",
	stt_audio_loaded: "{{call .T "stt_audio_loaded"}}",
	stt_play: "{{call .T "stt_play"}}",
	stt_pause: "{{call .T "stt_pause"}}",
	stt_transcribe_button: "{{call .T "stt_transcribe_button"}}",
	stt_no_file: "{{call .T "stt_no_file"}}",
	stt_failed: "{{call .T "stt_failed"}}",
	error_prefix: "{{call .T "error_prefix"}}",
};
</script>

<!-- Audio Upload Section -->
<div class="upload-controls">
	<!-- Audio File Input -->
	<div class="audio-input-section">
		<input type="file" id="audioFileInput" accept="audio/*">
		<label for="audioFileInput" class="file-input-label">📁 {{call .T "stt_choose_file"}}</label>
		<div style="flex: 1; display: flex; align-items: center;">
			<span class="audio-file-name" id="fileName">{{call .T "stt_no_file"}}</span>
		</div>
	</div>
</div>

<!-- Audio Player for playback -->
<div id="playerContainer" class="player-container" style="display: none;">
	<div class="player-controls">
		<button id="playBtn" class="play-btn">▶ {{call .T "stt_play"}}</button>
		<div class="progress-container">
			<input type="range" id="progressBar" class="progress-bar" min="0" value="0">
			<span id="timeDisplay" class="time-display">0:00 / 0:00</span>
		</div>
	</div>
</div>

<!-- Hidden Audio Element -->
<audio id="audioPlayer"></audio>

<!-- STT Form -->
<form id="sttForm">
	<div class="form-layout">
		<div class="form-left">
			<div class="form-group">
				<label for="transcriptOutput">{{call .T "stt_transcribed_text"}}</label>
				<textarea
					class="form-control"
					id="transcriptOutput"
					placeholder="{{call .T "stt_placeholder"}}"
					readonly></textarea>
			</div>
		</div>
		<div class="form-right">
			<div class="form-group">
				<label for="languageSelect">{{call .T "stt_select_language"}}</label>
				<select class="form-control" id="languageSelect">
					<option value="en">{{call .T "lang_english"}}</option>
					<option value="es">{{call .T "lang_spanish"}}</option>
					<option value="fr">{{call .T "lang_french"}}</option>
					<option value="de">{{call .T "lang_german"}}</option>
					<option value="it">{{call .T "lang_italian"}}</option>
					<option value="pt">{{call .T "lang_portuguese"}}</option>
					<option value="ja">{{call .T "lang_japanese"}}</option>
					<option value="ko">{{call .T "lang_korean"}}</option>
					<option value="zh">{{call .T "lang_chinese"}}</option>
				</select>
			</div>
			<div class="form-group">
				<label for="modelSelect">{{call .T "stt_select_model"}}</label>
				<select class="form-control" id="modelSelect">
					<option value="fast">{{call .T "stt_fast"}}</option>
					<option value="standard">{{call .T "stt_standard"}}</option>
					<option value="accurate">{{call .T "stt_accurate"}}</option>
				</select>
			</div>
			<button type="button" class="btn btn-transcribe" id="transcribeBtn">
				🎯 {{call .T "stt_transcribe_button"}}
			</button>
			<div id="statusMessage"></div>
			<div id="errorAlert" class="alert alert-danger" role="alert"></div>
			<div id="successAlert" class="alert alert-success" role="alert"></div>
		</div>
	</div>
</form>

<script>
	const audioFileInput = document.getElementById('audioFileInput');
	const fileName = document.getElementById('fileName');
	const transcribeBtn = document.getElementById('transcribeBtn');
	const transcriptOutput = document.getElementById('transcriptOutput');
	const languageSelect = document.getElementById('languageSelect');
	const modelSelect = document.getElementById('modelSelect');
	const audioPlayer = document.getElementById('audioPlayer');
	const playerContainer = document.getElementById('playerContainer');
	const playBtn = document.getElementById('playBtn');
	const progressBar = document.getElementById('progressBar');
	const timeDisplay = document.getElementById('timeDisplay');
	const errorAlert = document.getElementById('errorAlert');
	const successAlert = document.getElementById('successAlert');
	const statusMessage = document.getElementById('statusMessage');

	let audioUrl = null;
	let selectedAudioBlob = null;

	// File input handler
	audioFileInput.addEventListener('change', function(e) {
		const file = e.target.files[0];
		if (file) {
			fileName.textContent = file.name;
			selectedAudioBlob = file;

			if (audioUrl) {
				URL.revokeObjectURL(audioUrl);
			}
			audioUrl = URL.createObjectURL(file);
			audioPlayer.src = audioUrl;
			playerContainer.style.display = 'block';
			resetPlayer();

			hideAllAlerts();
			showSuccess(i18n.stt_audio_loaded);
		}
	});

	// Load saved preferences from localStorage
	function loadPreferences() {
		const savedLanguage = localStorage.getItem('stt-language');
		const savedModel = localStorage.getItem('stt-model');

		if (savedLanguage) {
			languageSelect.value = savedLanguage;
		}
		if (savedModel) {
			modelSelect.value = savedModel;
		}
	}

	// Save preferences
	function savePreferences() {
		localStorage.setItem('stt-language', languageSelect.value);
		localStorage.setItem('stt-model', modelSelect.value);
	}

	// Initialize
	loadPreferences();

	languageSelect.addEventListener('change', savePreferences);
	modelSelect.addEventListener('change', savePreferences);

	// Handle transcribe button click
	transcribeBtn.addEventListener('click', async function() {
		if (!selectedAudioBlob) {
			showError(i18n.stt_no_file);
			return;
		}

		transcribeBtn.disabled = true;
		transcribeBtn.textContent = '🎯 ' + i18n.stt_transcribing;
		statusMessage.textContent = i18n.stt_processing;
		hideAllAlerts();

		try {
			const formData = new FormData();
			formData.append('audio', selectedAudioBlob);
			formData.append('language', languageSelect.value);
			formData.append('model', modelSelect.value);

			const response = await fetch('/api/stt', {
				method: 'POST',
				body: formData
			});

			if (!response.ok) {
				const errorData = await response.json();
				throw new Error(errorData.error || i18n.stt_failed);
			}

			const result = await response.json();
			transcriptOutput.value = result.text || '';
			statusMessage.textContent = '';
			showSuccess(i18n.stt_success);

		} catch (error) {
			console.error('STT Error:', error);
			showError(i18n.error_prefix + error.message);
			statusMessage.textContent = '';
		} finally {
			transcribeBtn.disabled = false;
			transcribeBtn.textContent = '🎯 ' + i18n.stt_transcribe_button;
		}
	});

	// Play/Pause handler
	playBtn.addEventListener('click', function() {
		if (audioPlayer.paused) {
			audioPlayer.play();
		} else {
			audioPlayer.pause();
		}
		updatePlayButton();
	});

	audioPlayer.addEventListener('play', updatePlayButton);
	audioPlayer.addEventListener('pause', updatePlayButton);

	function updatePlayButton() {
		if (audioPlayer.paused) {
			playBtn.textContent = '▶ ' + i18n.stt_play;
		} else {
			playBtn.textContent = '⏸ ' + i18n.stt_pause;
		}
	}

	// Progress bar seeking
	progressBar.addEventListener('input', function() {
		if (audioPlayer.duration) {
			audioPlayer.currentTime = (progressBar.value / 100) * audioPlayer.duration;
		}
	});

	audioPlayer.addEventListener('timeupdate', function() {
		if (audioPlayer.duration) {
			progressBar.value = (audioPlayer.currentTime / audioPlayer.duration) * 100;
		}
		updateTimeDisplay();
	});

	audioPlayer.addEventListener('loadedmetadata', function() {
		progressBar.max = 100;
		updateTimeDisplay();
	});

	audioPlayer.addEventListener('ended', function() {
		resetPlayer();
	});

	function resetPlayer() {
		progressBar.value = 0;
		updatePlayButton();
		updateTimeDisplay();
	}

	function updateTimeDisplay() {
		const current = formatTime(audioPlayer.currentTime);
		const duration = formatTime(audioPlayer.duration);
		timeDisplay.textContent = current + ' / ' + duration;
	}

	function formatTime(seconds) {
		if (!seconds || isNaN(seconds)) return '0:00';
		const mins = Math.floor(seconds / 60);
		const secs = Math.floor(seconds % 60);
		return mins + ':' + secs.toString().padStart(2, '0');
	}

	function showError(message) {
		errorAlert.textContent = message;
		errorAlert.classList.add('show');
		successAlert.classList.remove('show');
	}

	function showSuccess(message) {
		successAlert.textContent = message;
		successAlert.classList.add('show');
		errorAlert.classList.remove('show');
	}

	function hideAllAlerts() {
		errorAlert.classList.remove('show');
		successAlert.classList.remove('show');
	}
</script>
{{end}}

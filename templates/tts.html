{{define "tts-content"}}
<!-- i18n strings for JavaScript -->
<script>
const i18n = {
	tts_no_voices: "{{call .T "tts_no_voices"}}",
	tts_error_loading_voices: "{{call .T "tts_error_loading_voices"}}",
	tts_error_loading_models: "{{call .T "tts_error_loading_models"}}",
	tts_no_tts_models: "{{call .T "tts_no_tts_models"}}",
	tts_enter_text_error: "{{call .T "tts_enter_text_error"}}",
	tts_speaking: "{{call .T "tts_speaking"}}",
	tts_generating: "{{call .T "tts_generating"}}",
	tts_failed: "{{call .T "tts_failed"}}",
	tts_no_audio: "{{call .T "tts_no_audio"}}",
	tts_play: "{{call .T "tts_play"}}",
	tts_pause: "{{call .T "tts_pause"}}",
	tts_speak_button: "{{call .T "tts_speak_button"}}",
	tts_loading_models: "{{call .T "tts_loading_models"}}",
	tts_download: "{{call .T "tts_download"}}",
	tts_audio_downloaded: "{{call .T "tts_audio_downloaded"}}",
	error_prefix: "{{call .T "error_prefix"}}",
};
</script>

<!-- Audio Player -->
<div id="playerContainer" class="player-container">
	<div class="player-controls">
		<button id="playBtn" class="play-btn">▶ {{call .T "tts_play"}}</button>
		<button id="downloadBtn" class="download-btn" disabled>{{call .T "tts_download"}}</button>
		<div class="progress-container">
			<input type="range" id="progressBar" class="progress-bar" min="0" value="0">
			<span id="timeDisplay" class="time-display">0:00 / 0:00</span>
		</div>
	</div>
</div>

<!-- Hidden Audio Element -->
<audio id="audioPlayer"></audio>

<!-- TTS Form -->
<form id="ttsForm">
	<div class="form-layout">
		<div class="form-left">
			<div class="form-group">
				<label for="paragraphInput">{{call .T "tts_enter_text"}}</label>
				<textarea
					class="form-control"
					id="paragraphInput"
					placeholder="{{call .T "tts_placeholder"}}"
					required></textarea>
			</div>
		</div>
		<div class="form-right">
			<div class="form-group">
				<label for="modelSelect">{{call .T "tts_select_model"}}</label>
				<select class="form-control" id="modelSelect">
					<option value="">{{call .T "tts_loading_models"}}</option>
				</select>
			</div>
			<div class="form-group">
				<label for="voiceSelect">{{call .T "tts_select_voice"}}</label>
				<select class="form-control" id="voiceSelect">
					<!-- Voices populated dynamically -->
				</select>
			</div>
			<button type="button" class="btn btn-primary btn-speak" id="speakBtn">
				🔊 {{call .T "tts_speak_button"}}
			</button>
			<div id="statusMessage"></div>
			<div id="errorAlert" class="alert alert-danger" role="alert"></div>
			<div id="successAlert" class="alert alert-success" role="alert"></div>
		</div>
	</div>
</form>

<script>
	const speakBtn = document.getElementById('speakBtn');
	const textInput = document.getElementById('paragraphInput');
	const modelSelect = document.getElementById('modelSelect');
	const voiceSelect = document.getElementById('voiceSelect');
	const audioPlayer = document.getElementById('audioPlayer');
	const playerContainer = document.getElementById('playerContainer');
	const playBtn = document.getElementById('playBtn');
	const downloadBtn = document.getElementById('downloadBtn');
	const progressBar = document.getElementById('progressBar');
	const timeDisplay = document.getElementById('timeDisplay');
	const errorAlert = document.getElementById('errorAlert');
	const successAlert = document.getElementById('successAlert');
	const statusMessage = document.getElementById('statusMessage');

	let audioUrl = null;
	let installedModels = [];

	// Error/Success handlers (defined early so they can be used by other functions)
	function showError(message) {
		errorAlert.textContent = message;
		errorAlert.classList.add('show');
		successAlert.classList.remove('show');
	}

	function showSuccess(message) {
		successAlert.textContent = message;
		successAlert.classList.add('show');
		errorAlert.classList.remove('show');
	}

	function hideAllAlerts() {
		errorAlert.classList.remove('show');
		successAlert.classList.remove('show');
	}

	// Fetch voices for selected model
	async function updateVoiceOptions() {
		const selectedModel = modelSelect.value;
		const previousVoice = voiceSelect.value;

		voiceSelect.innerHTML = '<option value="">' + i18n.tts_loading_models + '</option>';

		try {
			const response = await fetch(`/api/voices/${encodeURIComponent(selectedModel)}`);
			const voices = await response.json();

			voiceSelect.innerHTML = '';

			// Handle both grouped (Kokoro) and flat (Piper) voice formats
			const entries = Object.entries(voices);

			if (entries.length === 0) {
				voiceSelect.innerHTML = '<option value="">' + i18n.tts_no_voices + '</option>';
				return;
			}

			// Check if this is grouped format (Kokoro with categories) or flat format (Piper)
			const firstValue = entries[0][1];
			const isGrouped = Array.isArray(firstValue) && firstValue[0] && typeof firstValue[0] === 'object' && 'value' in firstValue[0];

			if (isGrouped) {
				// Grouped format (Kokoro)
				for (const [group, voiceList] of entries) {
					const optgroup = document.createElement('optgroup');
					optgroup.label = group;

					voiceList.forEach(voice => {
						const option = document.createElement('option');
						option.value = voice.value;
						option.textContent = voice.label;
						optgroup.appendChild(option);
					});

					voiceSelect.appendChild(optgroup);
				}
			} else {
				// Flat format (Piper)
				for (const [key, voice] of entries) {
					if (Array.isArray(voice)) {
						voice.forEach(v => {
							const option = document.createElement('option');
							option.value = v.value;
							option.textContent = v.label;
							voiceSelect.appendChild(option);
						});
					}
				}
			}

			if (previousVoice && Array.from(voiceSelect.options).some(opt => opt.value === previousVoice)) {
				voiceSelect.value = previousVoice;
			}
		} catch (error) {
			console.error('Error fetching voices:', error);
			voiceSelect.innerHTML = '<option value="">' + i18n.tts_error_loading_voices + '</option>';
		}
	}

	// Fetch installed models from API
	async function fetchInstalledModels() {
		try {
			const response = await fetch('/api/models');
			const data = await response.json();
			console.log('Models API response:', data);
			installedModels = data.tts || [];
			console.log('Installed TTS models:', installedModels);
			populateModelDropdown();
			restorePreferences();
		} catch (error) {
			console.error('Error fetching models:', error);
			modelSelect.innerHTML = '<option value="">' + i18n.tts_error_loading_models + '</option>';
			showError(i18n.tts_error_loading_models);
		}
	}

	// Populate model dropdown with installed models
	function populateModelDropdown() {
		modelSelect.innerHTML = '';

		if (installedModels.length === 0) {
			modelSelect.innerHTML = '<option value="">' + i18n.tts_no_tts_models + '</option>';
			return;
		}

		installedModels.forEach(model => {
			const option = document.createElement('option');
			option.value = model.id;
			option.textContent = model.name;
			modelSelect.appendChild(option);
		});

		if (modelSelect.options.length > 0) {
			modelSelect.value = modelSelect.options[0].value;
		}
	}

	// Load saved preferences from localStorage
	function loadPreferences() {
		const savedModel = localStorage.getItem('tts-model');
		const savedVoice = localStorage.getItem('tts-voice');

		if (savedModel && Array.from(modelSelect.options).some(opt => opt.value === savedModel)) {
			modelSelect.value = savedModel;
		}

		return savedVoice;
	}

	// Restore preferences after models are loaded
	function restorePreferences() {
		const savedVoice = loadPreferences();
		updateVoiceOptions();

		if (savedVoice && Array.from(voiceSelect.options).some(opt => opt.value === savedVoice)) {
			voiceSelect.value = savedVoice;
		}
	}

	// Save preferences
	function saveModelPreference() {
		localStorage.setItem('tts-model', modelSelect.value);
	}

	function saveVoicePreference() {
		localStorage.setItem('tts-voice', voiceSelect.value);
	}

	// Initialize by fetching installed models
	fetchInstalledModels();

	modelSelect.addEventListener('change', function() {
		saveModelPreference();
		updateVoiceOptions();
	});

	voiceSelect.addEventListener('change', saveVoicePreference);

	// Handle speak button click
	speakBtn.addEventListener('click', async function() {
		const text = textInput.value.trim();

		if (!text) {
			showError(i18n.tts_enter_text_error);
			return;
		}

		speakBtn.disabled = true;
		speakBtn.textContent = '🔊 ' + i18n.tts_speaking;
		statusMessage.textContent = i18n.tts_generating;
		hideAllAlerts();

		try {
			const response = await fetch('/api/tts', {
				method: 'POST',
				headers: {
					'Content-Type': 'application/json',
				},
				body: JSON.stringify({
					text: text,
					model: modelSelect.value,
					voice: voiceSelect.value
				})
			});

			if (!response.ok) {
				const errorData = await response.json();
				throw new Error(errorData.error || i18n.tts_failed);
			}

			const audioBlob = await response.blob();
			if (audioUrl) {
				URL.revokeObjectURL(audioUrl);
			}
			audioUrl = URL.createObjectURL(audioBlob);

			audioPlayer.src = audioUrl;
			resetPlayer();
			audioPlayer.play();
			updatePlayButton();
			downloadBtn.disabled = false;
			statusMessage.textContent = '';

		} catch (error) {
			console.error('TTS Error:', error);
			showError(i18n.error_prefix + error.message);
			statusMessage.textContent = '';
		} finally {
			speakBtn.disabled = false;
			speakBtn.textContent = '🔊 ' + i18n.tts_speak_button;
		}
	});

	// Handle download button click
	downloadBtn.addEventListener('click', function() {
		if (!audioUrl) {
			showError(i18n.tts_no_audio);
			return;
		}

		// Generate filename from text and timestamp
		const text = textInput.value.trim();
		const textPreview = text.substring(0, 30).replace(/[^a-z0-9]/gi, '_');
		const timestamp = new Date().toISOString().replace(/[:.]/g, '-').slice(0, -5);
		const filename = `tts_${textPreview}_${timestamp}.wav`;

		// Create a temporary link and trigger download
		const link = document.createElement('a');
		link.href = audioUrl;
		link.download = filename;
		document.body.appendChild(link);
		link.click();
		document.body.removeChild(link);

		showSuccess(i18n.tts_audio_downloaded + filename);
	});

	// Play/Pause handler
	playBtn.addEventListener('click', function() {
		if (audioPlayer.paused) {
			audioPlayer.play();
		} else {
			audioPlayer.pause();
		}
		updatePlayButton();
	});

	audioPlayer.addEventListener('play', updatePlayButton);
	audioPlayer.addEventListener('pause', updatePlayButton);

	function updatePlayButton() {
		if (audioPlayer.paused) {
			playBtn.textContent = '▶ ' + i18n.tts_play;
		} else {
			playBtn.textContent = '⏸ ' + i18n.tts_pause;
		}
	}

	// Progress bar seeking
	progressBar.addEventListener('input', function() {
		if (audioPlayer.duration) {
			audioPlayer.currentTime = (progressBar.value / 100) * audioPlayer.duration;
		}
	});

	audioPlayer.addEventListener('timeupdate', function() {
		if (audioPlayer.duration) {
			progressBar.value = (audioPlayer.currentTime / audioPlayer.duration) * 100;
		}
		updateTimeDisplay();
	});

	audioPlayer.addEventListener('loadedmetadata', function() {
		progressBar.max = 100;
		updateTimeDisplay();
	});

	audioPlayer.addEventListener('ended', function() {
		resetPlayer();
	});

	function resetPlayer() {
		progressBar.value = 0;
		updatePlayButton();
		updateTimeDisplay();
	}

	function updateTimeDisplay() {
		const current = formatTime(audioPlayer.currentTime);
		const duration = formatTime(audioPlayer.duration);
		timeDisplay.textContent = current + ' / ' + duration;
	}

	function formatTime(seconds) {
		if (!seconds || isNaN(seconds)) return '0:00';
		const mins = Math.floor(seconds / 60);
		const secs = Math.floor(seconds % 60);
		return mins + ':' + secs.toString().padStart(2, '0');
	}

	// Shift+Enter to submit
	textInput.addEventListener('keydown', function(e) {
		if (e.shiftKey && e.key === 'Enter') {
			e.preventDefault();
			speakBtn.click();
		}
	});
</script>
{{end}}
